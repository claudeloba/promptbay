name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate assets
        run: |
          node scripts/generate-payload-assets.js
          node scripts/generate-books-data.js
          node scripts/generate-collection-assets.js

      - name: Prepare site
        run: |
          mkdir -p _site/arc_pi_taxonomy/docs
          cp index.html _site/
          cp -r css _site/
          cp -r js _site/
          cp -r books-processed _site/
          cp -r arc_pi_taxonomy/docs/data _site/arc_pi_taxonomy/docs/data

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
